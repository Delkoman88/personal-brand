  <path d="M120 170H1480" stroke="#1A2628"/>
  <path d="M120 450H1480" stroke="#1A2628"/>
  <path d="M120 730H1480" stroke="#1A2628"/>
  <path d="M400 120V780" stroke="#1A2628"/>
  <path d="M800 120V780" stroke="#1A2628"/>
  <path d="M1200 120V780" stroke="#1A2628"/>
  <path d="M160 120V780" stroke="#1A2628" stroke-opacity="0.4"/>
